# 로컬 개발 기본 (맥북 localhost MySQL — docker compose up -d)
spring.datasource.url=jdbc:mysql://localhost:3306/godoksa_db?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=team_user
spring.datasource.password=team1234!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA 설정
spring.jpa.hibernate.ddl-auto=update

# 선택: API 키 등 비밀값 (application-secrets.properties.example 참고)
spring.config.import=optional:file:./application-secrets.properties

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.mandatory-file-encoding=UTF-8

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

ai.api.url=${AI_API_URL:https://api.groq.com/openai/v1/chat/completions}
ai.api.key=${AI_API_KEY:}
ai.model=${AI_MODEL:llama-3.1-8b-instant}

monitoring.ai.crisis-threshold=${AI_CRISIS_THRESHOLD:0.6}
