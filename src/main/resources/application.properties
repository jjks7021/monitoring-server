# DB 연결 설정
spring.datasource.url=jdbc:mysql://localhost:3306/godoksa_db?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=team_user
spring.datasource.password=team1234!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA 설정 (테이블 생성 및 SQL 로그 확인용)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 콘솔 로그 인코딩을 UTF-8로 강제 고정
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.mandatory-file-encoding=UTF-8

# 긴급 사진 1회 업로드 (메모리만 사용, DB 저장 없음)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

