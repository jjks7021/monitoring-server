# 로컬 개발용 MySQL (맥북에서 Spring Boot + Flutter)
# 실행: docker compose up -d
services:
  mysql:
    image: mysql:8.0
    container_name: godoksa-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: godoksa_db
      MYSQL_USER: team_user
      MYSQL_PASSWORD: team1234!
      TZ: Asia/Seoul
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    volumes:
      - godoksa_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  godoksa_mysql_data:
